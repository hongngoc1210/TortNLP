seed: 42

data:
  train_path: "datasets/train001.jsonl"

model:
  encoder_name: "sbintuitions/modernbert-ja-310m"
  claim_chunk_size: 64

  # Stage 1: claim-centric evidence fusion
  fusion_heads: 4
  fusion_dropout: 0.1
  topk_fact_tokens: 16
  topk_opponents: 3

  # Stage 2
  re_dropout: 0.1

  # Stage 3: rationale pooling
  topk_claims: 5
  aggregation_dropout: 0.1

  # Stage 4: tort prediction
  td_num_heads: 4
  td_dropout: 0.2

training:
  epochs: 25
  batch_size: 16
  lr: 2e-5
  encoder_lr_multiplier: 0.1
  weight_decay: 1e-2
  warmup_ratio: 0.06
  grad_accum_steps: 4
  max_grad_norm: 1.0
  early_stopping_patience: 5
  use_amp: true

teacher_forcing:
  start: 1.0
  end: 0.0
  epochs: 10

loss:
  # Main objective: L = 0.33 * L_RE + 0.67 * L_TP
  weight_re: 0.33
  weight_tp: 0.67
  # Recommended: average plaintiff and defendant losses. The former sum
  # reduction made the effective RE contribution about twice as large.
  re_side_reduction: mean

system:
  device: "cuda"
  num_workers: 2
  save_dir: "outputs/ablations"

# Run named experiments with:
# python src/ablation_main.py --experiment joint_predicted
ablation:
  task_mode: joint                 # joint | re_only | tp_only
  tp_input_mode: rationale         # rationale | global_only
  train_rationale_source: teacher_forcing
  eval_rationale_source: predicted
  use_task_adapters: false
  adapter_bottleneck: 128
  adapter_dropout: 0.1
  detach_rationale_for_tp: false
  use_global_residual: false
  rationale_scale_init: -1.5
  gradient_method: standard        # standard | pcgrad
  grad_diagnostics_every: 0

evaluation:
  selection_metric: mean           # mean | tp | re
  compare_rationale_sources: true
  rationale_sources: [predicted, gold, no_rationale, random]
